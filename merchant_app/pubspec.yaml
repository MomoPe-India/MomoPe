name: merchant_app
description: "MomoPe Merchant App — QR payments, KYC, and dashboard"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  firebase_messaging: ^15.1.3

  # Supabase
  supabase_flutter: ^2.7.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Auth — PIN Hashing (client-side Approach A)
  bcrypt: ^1.1.3

  # Navigation
  go_router: ^14.6.3

  # UI
  google_fonts: ^6.2.1

  # QR Generator (merchant home screen)
  qr_flutter: ^4.1.0

  # Charts (7-day revenue)
  fl_chart: ^0.66.2

  # Internationalization
  intl: ^0.19.0

  # Utilities
  url_launcher: ^6.3.0
  share_plus: ^10.0.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
